spring:
  application:
    name: go-routex-booking-service

  threads:
    virtual:
      enabled: true

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        compression.type: gzip
        linger.ms: 10

    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "vn.com.*"
        spring.json.use.type.headers: false
        session.timeout.ms: 30000
        max.poll.records: 500

    events:
      trip-ready-for-sale: "routex.trip.ready-for-sale"
      trip-assigned: "routex.trip.assigned"
      booking-created: "routex.booking.created"
      booking-confirmed: "routex.booking.confirmed"
      booking-cancelled: "routex.booking.cancelled"
      booking-failed: "routex.booking.failed"
      ticket-issued: "routex.ticket.issued"
      payment-succeeded: "routex.payment.succeeded"
      payment-failed: "routex.payment.failed"
      payment-refunded: "routex.payment.refunded"
      seat-reserved: "routex.seat.reserved"
      seat-released: "routex.seat.released"
      seat-locked: "routex.seat.locked"
      notification-email: "routex.notification.email"
      notification-sms: "routex.notification.sms"
      notification-activities: "routex.notification.activities"

    topics:
      trips: "trip.management.event"
      routes: "route.management.event"
      booking: "route.bookings.event"
      payments: "route.payments.event"
      seats: "seat.event.management"
      notifications: "notification.event.management"
      dead-letter: "bus-dead-letter-queue"

    group-id:
      trips: "booking-service-trips"
      bookings: "booking-service"
      payments: "booking-service-payments"
      payment-succeeded: "booking-service-payment-succeeded"
      payment-failed: "booking-service-payment-failed"
      routes: "booking-service-routes"

    listener:
      ack-mode: manual

  retry:
    max-attempts: 3
    backoff-ms: 1000
    backoff-multiplier: 2

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    mapper:
      sort-properties-alphabetically: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

jms:
  thread:
    receive:
      timeout-seconds: ${JMS_THREAD_RECEIVE_TIMEOUT_SECONDS:30}
    send:
      timeout-seconds: ${JMS_THREAD_SEND_TIMEOUT_SECONDS:5}
  receive:
    timeout: ${JMS_RECEIVE_TIMEOUT:30000}
  caching:
    session-cache-size: ${JMS_CACHING_SESSION_CACHE_SIZE:256}
  time-to-live-milliseconds: ${JMS_TIME_TO_LIVE_MILLISECONDS:20000}
  recovery-interval: ${JMS_RECOVERY_INTERVAL:5000}
  max-message: ${JMS_MAX_MESSAGE:1}

server:
  port: ${SERVER_PORT:8084}

identity:
  jwt:
    secret: ${JWT_SECRET:CZZRadv0Xe8z3stWFWYdtiJ2E86gUgJvFEfbCYFgJhQ}
    issuer: ${JWT_ISSUER:user-service}
    audience: ${JWT_AUDIENCE:management-service}
    authority-claim-name: ${JWT_CLAIM_NAME:roles}
    authority-prefix: ${JWT_AUTH_PREFIX:ROLE_}

logging:
  level:
    org.springframework: WARN
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    root: INFO

booking:
  hold-expiration:
    fixed-delay-ms: ${BOOKING_HOLD_EXPIRATION_FIXED_DELAY_MS:15000}
    initial-delay-ms: ${BOOKING_HOLD_EXPIRATION_INITIAL_DELAY_MS:15000}
    batch-size: ${BOOKING_HOLD_EXPIRATION_BATCH_SIZE:100}

clients:
  merchant-platform:
    base-url: ${MERCHANT_PLATFORM_BASE_URL:http://localhost:8080/api/v1/merchant-service/internal}
  payment-service:
    base-url: ${PAYMENT_SERVICE_BASE_URL:http://localhost:8080/api/v1/payment-service/internal}
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8080/api/v1/user-service/internal}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9094}
  client:
    merchantService:
      address: ${MERCHANT_SERVICE_GRPC_ADDRESS:static://localhost:9090}
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext
    paymentService:
      address: ${PAYMENT_SERVICE_GRPC_ADDRESS:static://localhost:9096}
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

